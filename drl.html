<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - TVU</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
    
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    

    <div class="bg-white rounded-lg shadow-md border border-gray-200 max-w-md w-full overflow-hidden text-center">
        
        <div class="p-6 pb-4 flex flex-col items-center">
            <img src="https://cdn.haitrieu.com/wp-content/uploads/2021/12/Logo-DH-Tra-Vinh-TVU.png" alt="TVU Logo" class="h-28 w-auto mb-4 object-contain">
            
            <h2 class="text-blue-900 font-bold text-lg uppercase tracking-wide">
                Phần mềm tin học
            </h2>
            <h1 class="text-blue-900 font-extrabold text-xl uppercase mt-1 leading-snug px-2">
                Đánh giá kết quả rèn luyện cho sinh viên chính quy <br> tại đại học trà vinh
            </h1>
        </div>

        <hr class="border-gray-200 mx-6">

        <form class="p-6 space-y-4 text-left" onsubmit="event.preventDefault();">
            
            <div class="flex border border-gray-300 rounded-md overflow-hidden focus-within:ring-2 focus-within:ring-blue-500">
                <input type="email" placeholder="Email" class="w-full px-3 py-2.5 outline-none text-gray-700 placeholder-gray-400">
                <span class="bg-gray-100 px-4 flex items-center justify-center text-gray-500 border-l border-gray-300 w-12">
                    <i class="fa-solid fa-envelope"></i>
                </span>
            </div>

            <div class="flex border border-gray-300 rounded-md overflow-hidden focus-within:ring-2 focus-within:ring-blue-500">
                <input type="password" placeholder="Mật khẩu" class="w-full px-3 py-2.5 outline-none text-gray-700 placeholder-gray-400">
                <span class="bg-gray-100 px-4 flex items-center justify-center text-gray-500 border-l border-gray-300 w-12">
                    <i class="fa-solid fa-lock"></i>
                </span>
            </div>

            <div class="flex items-center justify-between pt-1">
                <label class="flex items-center space-x-2 cursor-pointer select-none">
                    <input type="checkbox" class="w-5 h-5 border-gray-300 rounded text-blue-600 focus:ring-blue-500">
                    <span class="text-gray-800 font-bold text-base">Nhớ mật khẩu</span>
                </label>
                
                <button type="submit" class="bg-[#007bff] hover:bg-blue-700 text-white font-medium px-8 py-2 rounded text-base transition-colors duration-200 min-w-[140px] text-center">
                    Đăng nhập
                </button>
            </div>

            <div class="space-y-3 pt-2">
                <button type="button" class="w-full bg-[#007bff] hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded transition-colors duration-200 text-center">
                    Sinh viên (Đăng nhập bằng Email Microsoft)
                </button>
                
                <button type="button" class="w-full bg-[#dc3545] hover:bg-red-700 text-white font-medium py-2.5 px-4 rounded transition-colors duration-200 text-center">
                    Giảng viên (Đăng nhập bằng Email TVU)
                </button>
            </div>

            <div class="pt-2">
                <a href="#" class="text-[#007bff] hover:underline text-base font-medium">
                    Quên mật khẩu?
                </a>
            </div>
            <div class="pt-4 border-t border-gray-100 text-center mt-2">
    <a href="index.html" class="inline-flex items-center text-sm text-gray-500 hover:text-blue-600 font-medium transition-colors">
        <i class="fa-solid fa-arrow-left mr-2"></i> Trở về trang chủ
    </a>
</div>

        </form>
    </div>

</body>
</html>
